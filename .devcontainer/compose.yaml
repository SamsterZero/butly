version: "3.9"

services:
  app:
    env_file:
      - ../.env
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
      # Persist the Maven local repo across rebuilds so deps aren't re-downloaded every time
      - maven-cache:/home/vscode/.m2
    command: sleep infinity
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - butly-net

  postgres:
    image: postgres:18
    restart: unless-stopped
    env_file:
      - ../.env.docker
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - butly-net

  redis:
    image: redis:8.8.0-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - butly-net

volumes:
  postgres-data:
  maven-cache:

networks:
  butly-net:
